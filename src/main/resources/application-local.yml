spring:
  datasource:
    url: jdbc:h2:mem:travel_mvp;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:data-local.sql

app:
  mock-external-data: true

